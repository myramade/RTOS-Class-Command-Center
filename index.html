<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTOS Day 2 — Attack &amp; Harden Command Center</title>
<style>
  :root{
    --navy:#0A2A55;
    --navy2:#0E3B74;
    --cyan:#0C7C93;
    --cyan-bright:#12AEC9;
    --ink:#14212E;
    --muted:#5A6B7D;
    --line:#D8E1EC;
    --panel:#FFFFFF;
    --panel2:#F1F5FA;
    --soft:#F6F9FC;
    --code-bg:#F4F7FB;
    --green:#1F9D57;
    --amber:#B7791F;
    --red:#D64545;
    --red-team:#C2410C;
    --blue-team:#1D6FD6;
    --chip:#1D4FB0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#FFFFFF;
    color:var(--ink);
    font-family:Arial, "Helvetica Neue", Helvetica, "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  em{font-style:italic;color:var(--cyan);}
  /* three-segment dash motif */
  .dash{display:inline-flex;gap:5px;vertical-align:middle;margin-right:12px;}
  .dash span{display:block;width:20px;height:5px;border-radius:2px;background:var(--cyan-bright);}
  .dash span:nth-child(2){opacity:.65;width:13px;}
  .dash span:nth-child(3){opacity:.35;width:8px;}

  /* ---------- Facilitator top bar ---------- */
  header{
    position:sticky;top:0;z-index:50;
    background:#FFFFFF;
    border-bottom:2px solid var(--line);
    padding:10px 18px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    box-shadow:0 3px 12px rgba(20,40,70,.08);
  }
  .brand{display:flex;align-items:center;gap:2px;font-weight:800;letter-spacing:.5px;font-size:18px;color:var(--navy);}
  .brand small{display:block;font-size:10px;font-weight:700;color:var(--cyan);letter-spacing:2px;margin-top:2px;}
  .kicker{color:var(--cyan);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;}
  .spacer{flex:1;}
  .clock{
    font-variant-numeric:tabular-nums;font-weight:800;font-size:22px;letter-spacing:1px;
    background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:6px 14px;color:var(--navy);
  }
  .clock.run{color:var(--green);border-color:var(--green);}
  .btn{
    cursor:pointer;border:1px solid var(--line);background:#FFFFFF;color:var(--ink);
    padding:8px 14px;border-radius:9px;font-weight:700;font-size:13px;transition:.15s;user-select:none;
  }
  .btn:hover{background:var(--panel2);border-color:var(--cyan);}
  .btn.cyan{background:var(--cyan-bright);color:#04263a;border-color:var(--cyan-bright);}
  .btn.cyan:hover{filter:brightness(1.05);}
  .btn.ghost{background:transparent;}
  .btn.sm{padding:5px 10px;font-size:12px;}
  .btn.on{background:var(--cyan-bright);color:#04263a;border-color:var(--cyan-bright);}

  /* ---------- Layout ---------- */
  .wrap{display:flex;min-height:calc(100vh - 62px);}
  nav.rail{
    width:230px;flex-shrink:0;background:var(--soft);border-right:1px solid var(--line);
    padding:12px 10px;position:sticky;top:62px;height:calc(100vh - 62px);overflow:auto;
  }
  .rail h4{color:var(--muted);font-size:10px;letter-spacing:2px;margin:14px 8px 6px;text-transform:uppercase;}
  .navitem{
    display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border-radius:9px;cursor:pointer;margin-bottom:3px;
    border:1px solid transparent;transition:.12s;
  }
  .navitem:hover{background:var(--panel2);}
  .navitem.active{background:#E4F3F7;border-color:var(--cyan);}
  .navitem .num{
    flex-shrink:0;width:24px;height:24px;border-radius:6px;background:#FFFFFF;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--cyan);
  }
  .navitem.active .num{background:var(--cyan-bright);color:#04263a;border-color:var(--cyan-bright);}
  .navitem .t{font-size:12.5px;font-weight:700;line-height:1.25;color:var(--ink);}
  .navitem .t small{display:block;color:var(--muted);font-weight:600;font-size:10.5px;margin-top:2px;}

  main{flex:1;padding:26px 34px 90px;max-width:1100px;}
  .modtag{color:var(--cyan);font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;}
  h1.title{font-size:30px;margin:6px 0 4px;line-height:1.1;color:var(--navy);}
  .sub{color:var(--muted);font-size:14px;margin-bottom:18px;}
  .band{
    background:linear-gradient(90deg,#EAF2FB,#F6F9FC);border-left:4px solid var(--cyan-bright);
    padding:12px 16px;border-radius:0 10px 10px 0;margin:14px 0;color:var(--ink);font-size:14px;
  }
  .band b{color:var(--navy);}
  .grid{display:grid;gap:14px;}
  .card{
    background:#FFFFFF;border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    box-shadow:0 2px 8px rgba(20,40,70,.05);
  }
  .card h3{margin:0 0 8px;font-size:16px;color:var(--navy);}
  .pill{display:inline-block;background:#E7EEFB;color:var(--chip);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin:0 6px 6px 0;}
  .pill.src{background:#E4F5EA;color:#177a44;}
  .pill.ring{background:#FBEADF;color:var(--red-team);}
  .pill.wiz{background:#E6F0FD;color:var(--blue-team);}
  code,pre{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;}
  code{color:var(--navy);background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:.92em;}
  pre{
    background:var(--code-bg);border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow:auto;
    font-size:13.5px;line-height:1.5;color:#1A2733;margin:10px 0;
  }
  pre code{background:none;padding:0;color:inherit;}
  .cmt{color:#6B7D90;}
  .kw{color:#0550AE;font-weight:600;}
  .str{color:#0A7D2C;}
  .vuln{background:#FBE0E0;border-bottom:2px solid var(--red);border-radius:3px;padding:0 2px;cursor:pointer;}
  .vuln.found{background:#DDF3E5;border-bottom-color:var(--green);}

  .taskbox{background:#EAF2FB;border:1px dashed var(--cyan);border-radius:12px;padding:14px 16px;margin:14px 0;}
  .taskbox .lab{color:var(--cyan);font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}

  .reveal{display:none;}
  .reveal.show{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .answer{background:#E9F7EF;border:1px solid #9BD8B4;border-radius:12px;padding:14px 16px;margin-top:12px;}
  .answer .lab{color:#177a44;font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}

  /* option chips */
  .opts{display:grid;gap:8px;margin:10px 0;}
  .opt{
    border:1px solid var(--line);background:var(--panel2);border-radius:10px;padding:10px 12px;cursor:pointer;font-size:14px;transition:.12s;color:var(--ink);
  }
  .opt:hover{border-color:var(--cyan);}
  .opt.correct{border-color:var(--green);background:#E1F5E9;}
  .opt.wrong{border-color:var(--red);background:#FBE3E3;}
  .opt .why{display:none;font-size:12.5px;color:var(--muted);margin-top:6px;}
  .opt.correct .why,.opt.wrong .why{display:block;}

  /* order challenge */
  .steps{display:grid;gap:8px;}
  .step{
    display:flex;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:grab;font-size:13.5px;color:var(--ink);
  }
  .step .h{width:22px;height:22px;border-radius:6px;background:#FFFFFF;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);}
  .step.dragging{opacity:.4;}
  .step.ok .h{background:var(--green);color:#fff;border-color:var(--green);}
  .step.bad .h{background:var(--red);color:#fff;border-color:var(--red);}

  /* MPU / data tables */
  table.mpu{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;}
  table.mpu th,table.mpu td{border:1px solid var(--line);padding:8px 10px;text-align:left;}
  table.mpu th{background:var(--navy);color:#FFFFFF;font-size:11px;letter-spacing:1px;text-transform:uppercase;}
  table.mpu td{color:var(--ink);}
  .toggle{cursor:pointer;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--line);user-select:none;}
  .toggle.on{background:#E1F5E9;color:#177a44;border-color:var(--green);}
  .toggle.off{background:#FBE3E3;color:var(--red);border-color:var(--red);}

  /* leaderboard */
  aside.board{
    width:250px;flex-shrink:0;background:var(--soft);border-left:1px solid var(--line);
    position:sticky;top:62px;height:calc(100vh - 62px);overflow:auto;padding:14px 12px;
  }
  .board h4{color:var(--cyan);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:2px 4px 10px;}
  .team{background:#FFFFFF;border:1px solid var(--line);border-radius:11px;padding:9px 10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(20,40,70,.05);}
  .team .row1{display:flex;align-items:center;gap:8px;}
  .team .nm{font-weight:800;font-size:13px;flex:1;color:var(--ink);}
  .team .sc{font-variant-numeric:tabular-nums;font-weight:800;font-size:18px;color:var(--navy);}
  .team .ctrl{display:flex;gap:5px;margin-top:7px;}
  .team .ctrl .btn{flex:1;text-align:center;padding:4px 0;font-size:12px;}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .addteam{display:flex;gap:6px;margin:6px 4px 12px;}
  .addteam input{flex:1;background:#FFFFFF;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 8px;font-size:12px;}

  .rb{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;}
  .rb .col{flex:1;min-width:230px;border-radius:12px;padding:12px 14px;border:1px solid var(--line);}
  .rb .red{background:#FDECE4;border-color:var(--red-team);}
  .rb .blue{background:#E9F2FD;border-color:var(--blue-team);}
  .rb h4{margin:0 0 6px;font-size:13px;letter-spacing:1px;text-transform:uppercase;}
  .rb .red h4{color:var(--red-team);}
  .rb .blue h4{color:var(--blue-team);}
  .rb ul{margin:6px 0 0;padding-left:18px;font-size:13px;line-height:1.5;color:var(--ink);}

  .facnote{background:#FFF7E1;border:1px solid var(--amber);border-radius:10px;padding:10px 14px;margin:14px 0;font-size:13px;color:#6B5310;}
  .facnote b{color:#8a6410;}
  .timer-suggest{display:inline-flex;align-items:center;gap:6px;background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted);font-weight:700;}
  .footctrl{display:flex;gap:10px;margin-top:26px;padding-top:18px;border-top:1px solid var(--line);}
  ul.clean{padding-left:20px;line-height:1.6;font-size:14px;}
  ul.clean li{margin-bottom:5px;}
  .kbd{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px;font-family:monospace;color:var(--navy);font-weight:700;}
  hr.soft{border:none;border-top:1px solid var(--line);margin:22px 0;}
  .metrics{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 4px;}
  .metric{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:8px 14px;}
  .metric .v{font-size:22px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;}
  .metric .l{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
  .flash{animation:flash .6s ease;}
  @keyframes flash{0%{background:#E4F3F7;}100%{background:#FFFFFF;}}

  /* bilingual instructions */
  .bilang{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .bilang .lang{background:#FFFFFF;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 2px 8px rgba(20,40,70,.05);}
  .bilang .flag{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .bilang ol{padding-left:20px;margin:0;line-height:1.65;font-size:14px;}
  .bilang ol li{margin-bottom:9px;}
  .bilang b{color:var(--navy);}
  /* bilingual per-station brief */
  .brief{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:16px 0;box-shadow:0 2px 8px rgba(20,40,70,.05);}
  .brief-hd{background:var(--navy);color:#fff;font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:9px 16px;}
  .brief-grid{display:grid;grid-template-columns:1fr 1fr;}
  .brief-col{padding:14px 16px;background:#fff;}
  .brief-col.tr{background:var(--soft);border-left:1px solid var(--line);}
  .brief-col .bl{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--cyan);margin-bottom:6px;}
  .brief-col p{margin:0 0 8px;font-size:13.5px;line-height:1.55;color:var(--ink);}
  .brief-col p:last-child{margin-bottom:0;}
  .brief-col b{color:var(--navy);}
  @media(max-width:820px){.brief-grid{grid-template-columns:1fr;}.brief-col.tr{border-left:none;border-top:1px solid var(--line);}}

  /* code navigator */
  .cn-wrap{display:grid;grid-template-columns:230px 1fr;gap:14px;margin:12px 0;}
  .cn-tree{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:10px;font-size:13px;height:fit-content;}
  .cn-tree .fh{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:10px 6px 4px;}
  .cn-tree .fh:first-child{margin-top:2px;}
  .cn-sym{display:flex;gap:7px;align-items:center;padding:6px 8px;border-radius:7px;cursor:pointer;color:var(--ink);border:1px solid transparent;}
  .cn-sym:hover{background:#E4F3F7;}
  .cn-sym.active{background:#E4F3F7;border-color:var(--cyan);font-weight:700;}
  .cn-sym .fx{font-family:monospace;color:var(--cyan);font-size:12px;}
  .cn-main{min-width:0;}
  .cn-crumb{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;margin-bottom:8px;color:var(--muted);}
  .cn-crumb .c{cursor:pointer;color:var(--cyan);font-weight:700;}
  .cn-crumb .c:hover{text-decoration:underline;}
  .cn-filetitle{font-family:monospace;font-size:13px;color:var(--navy);font-weight:700;margin-bottom:6px;}
  .cn-code{background:var(--code-bg);border:1px solid var(--line);border-radius:12px;padding:12px 6px;overflow:auto;}
  .cn-line{font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:13px;line-height:1.55;white-space:pre;padding:1px 12px;border-left:3px solid transparent;}
  .cn-line .ln{color:#9DB4D4;user-select:none;}
  .cn-focus{background:#FFF7E1;border-left-color:var(--amber);}
  .cn-lnk{color:var(--cyan);font-weight:700;cursor:pointer;border-bottom:1px dotted var(--cyan);}
  .cn-lnk:hover{background:#E4F3F7;}
  .cn-cmt{color:#6B7D90;}
  .cn-note{margin-top:12px;background:#EAF2FB;border:1px solid var(--line);border-left:4px solid var(--cyan);border-radius:0 10px 10px 0;padding:12px 14px;font-size:13.5px;color:var(--ink);}
  .cn-note b{color:var(--navy);}
  .cn-tag{display:inline-block;background:var(--navy);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:20px;margin-right:6px;}
  @media(max-width:820px){.cn-wrap{grid-template-columns:1fr;}}

  /* live debugger */
  .cn-modes{display:flex;gap:8px;margin:14px 0 6px;}
  .cn-mode{cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 16px;border-radius:9px;font-weight:700;font-size:13px;}
  .cn-mode.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .dbg-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin:10px 0;}
  .dbg-scn{display:flex;gap:6px;flex-wrap:wrap;}
  .dbg-tab{cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);padding:6px 12px;border-radius:8px;font-weight:700;font-size:12.5px;}
  .dbg-tab.on{background:var(--cyan-bright);color:#04263a;border-color:var(--cyan-bright);}
  .dbg-def{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--navy);}
  .dbg-switch{cursor:pointer;user-select:none;min-width:52px;text-align:center;padding:5px 12px;border-radius:20px;font-weight:800;font-size:12px;border:1px solid var(--line);}
  .dbg-switch.off{background:#FBE3E3;color:var(--red);border-color:var(--red);}
  .dbg-switch.on{background:#E1F5E9;color:#177a44;border-color:var(--green);}
  .dbg-grid{display:grid;grid-template-columns:1fr 270px;gap:12px;}
  .dbg-h{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:0 0 6px;}
  .dbg-codewrap,.dbg-side{background:var(--code-bg);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .dbg-code{font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:13px;line-height:1.6;}
  .dbg-cl{white-space:pre;padding:1px 8px;border-left:3px solid transparent;border-radius:3px;color:#1A2733;}
  .dbg-cl .cn-cmt{color:#6B7D90;}
  .dbg-cur{background:#FFF3CE;border-left-color:var(--amber);font-weight:600;}
  .dbg-cur::before{content:"▸ ";color:var(--amber);margin-left:-14px;}
  .dbg-regs{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-family:monospace;font-size:13px;}
  .dbg-regs .rk{color:var(--muted);font-weight:700;}
  .dbg-regs .rv{color:var(--navy);text-align:right;}
  .dbg-regs .rv.hb{color:var(--red);font-weight:800;background:#FBE3E3;border-radius:3px;}
  .dbg-regs .rv.hg{color:#177a44;font-weight:800;background:#E1F5E9;border-radius:3px;}
  .dbg-mem{background:var(--code-bg);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:12px;}
  .dbg-cell{display:flex;justify-content:space-between;gap:12px;font-family:monospace;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);margin-bottom:6px;background:#fff;}
  .dbg-cell .cl{color:var(--ink);}
  .dbg-cell .cv{color:var(--navy);font-weight:700;}
  .dbg-cell.written{background:#EAF7EF;border-color:#9BD8B4;}
  .dbg-cell.intact{background:#EAF7EF;border-color:#9BD8B4;}
  .dbg-cell.corrupt{background:#FBE3E3;border-color:var(--red);}
  .dbg-cell.corrupt .cv{color:var(--red);}
  .dbg-cell.shell{background:#FFF3CE;border-color:var(--amber);}
  .dbg-mpurow{display:flex;justify-content:space-between;font-family:monospace;font-size:12.5px;padding:5px 8px;border-radius:6px;border:1px solid var(--line);margin-bottom:5px;background:#fff;}
  .dbg-mpurow.hot{background:#FFF3CE;border-color:var(--amber);font-weight:700;}
  .dbg-console{background:#0B1A2E;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:12px;}
  .dbg-console .dbg-h{color:#7fa8c9;}
  .dbg-log{font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:12.5px;line-height:1.6;max-height:180px;overflow:auto;}
  .dbg-log .l{color:#c9d8e8;}
  .dbg-log .l .step{color:#4d6a8f;}
  .dbg-log .l.warn{color:#f2c037;}
  .dbg-log .l.danger{color:#ff7b7b;font-weight:700;}
  .dbg-log .l.good{color:#63e6a0;font-weight:700;}
  .dbg-banner{margin-top:12px;border-radius:12px;padding:12px 16px;font-weight:800;font-size:15px;text-align:center;letter-spacing:.5px;}
  .dbg-banner.bad{background:#FBE3E3;color:var(--red);border:1px solid var(--red);}
  .dbg-banner.good{background:#E1F5E9;color:#177a44;border:1px solid var(--green);}
  .dbg-ctrl{display:flex;gap:10px;align-items:center;margin-top:12px;}
  .dbg-count{font-family:monospace;font-size:12px;color:var(--muted);margin-left:auto;}
  @media(max-width:820px){.dbg-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <span class="dash"><span></span><span></span><span></span></span>
  <div class="brand">RTOS DAY 2<small>ATTACK &amp; HARDEN — COMMAND CENTER</small></div>
  <div class="spacer"></div>
  <div class="timer-suggest" id="stationTimer">◷ <span id="stTime">45:00</span></div>
  <button class="btn sm" id="startTimer">Start station</button>
  <button class="btn sm ghost" id="resetTimer">Reset</button>
  <div class="clock" id="dayClock">00:00:00</div>

function renderMain(){
  const s = stations[state.station];
  const main = document.getElementById('main');
  main.innerHTML = s.render();
  // wire reveal buttons
  main.querySelectorAll('.revbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      const id = 'rev-'+b.dataset.r;
      const el = document.getElementById(id);
      el.classList.toggle('show');
      b.textContent = el.classList.contains('show') ? b.textContent.replace('▾','▴') : b.textContent.replace('▴','▾');
    });
  });
  if(s.mount) s.mount();
  // reset station timer suggestion
  stTimerSeconds = s.min*60; renderStTimer(); stopStTimer();
  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0,0);
}

function go(i){
  if(i<0||i>=stations.length) return;
  state.station = i;
  renderRail(); renderMain();
}

function mountMPU(){
  // each region: attributes user toggles; target defines the secure config
  const regions=[
    {name:"R0 · DAL A Flight Control", target:{priv:true, xnOthers:true}, priv:false, xnOthers:false},
    {name:"R1 · Parser task stack",    target:{np:true, xn:true},        np:false, xn:false},
    {name:"R2 · SPI / peripherals",    target:{privOnly:true},           privOnly:false},
    {name:"R3 · Background (unmapped)", target:{disabled:true},          disabled:false},
  ];
  const T=document.getElementById('mpuTable');
  function draw(){
    T.innerHTML = `<tr><th>Region</th><th>Attribute A</th><th>Attribute B</th></tr>` +
    regions.map((r,i)=>{
      let a='',b='';
      if(i===0){ a=tog('Privileged access', r.priv, `regTog(0,'priv')`); b=tog('Execute-never for others', r.xnOthers, `regTog(0,'xnOthers')`);}
      if(i===1){ a=tog('Non-privileged RW', r.np, `regTog(1,'np')`); b=tog('XN (execute-never)', r.xn, `regTog(1,'xn')`);}
      if(i===2){ a=tog('Privileged-only', r.privOnly, `regTog(2,'privOnly')`); b='<span style="color:var(--muted)">—</span>';}
      if(i===3){ a=tog('Region disabled (fault on access)', r.disabled, `regTog(3,'disabled')`); b='<span style="color:var(--muted)">—</span>';}
      return `<tr><td>${r.name}</td><td>${a}</td><td>${b}</td></tr>`;
    }).join("");
  }
  function tog(label,on,fn){
    return `<span class="toggle ${on?'on':'off'}" onclick="${fn}">${label}: ${on?'ON':'OFF'}</span>`;
  }
  window.regTog=(i,k)=>{ regions[i][k]=!regions[i][k]; draw(); check(); };
  function check(){
    const ok = regions[0].priv&&regions[0].xnOthers&&regions[1].np&&regions[1].xn&&regions[2].privOnly&&regions[3].disabled;
    const m=document.getElementById('mpuMsg');
    if(ok){ m.textContent='✓ Isolation holds. Parser can neither execute its stack nor reach DAL A; unmapped access faults.'; m.style.color='var(--green)'; }
    else { m.textContent='Config still leaky — the parser must be XN and DAL A must be execute-never to everyone else.'; m.style.color='var(--amber)'; }
  }
  draw(); check();
}

/* =========================================================
   STATION 2 — FREERTOS KERNEL THREAT MODEL
========================================================= */
function mountKernelTM(){
  /* ---- Challenge A: authorization matrix ---- */
  const cycle=["–","R","RW","RX","RWX"];
  const cols=["App code","Own stack","Kernel objects","MPU ctrl reg","Peripheral regs"];
  const rows=[
    {a:"Unprivileged task", target:["RX","RW","–","–","–"]},
    {a:"Privileged task",   target:["RX","RW","RW","RW","RW"]},
    {a:"ISR",               target:["RX","–","RW","–","RW"]},
    {a:"Peripheral (DMA)",  target:["–","–","–","–","RW"]},
  ];
  const cur = rows.map(r=>r.target.map(()=>0)); // all start at "–"
  const T=document.getElementById('authTable');
  function draw(){
    T.innerHTML = `<tr><th>Actor \\ Asset</th>${cols.map(c=>`<th>${c}</th>`).join("")}</tr>` +
      rows.map((r,ri)=>`<tr><td><b>${r.a}</b></td>${r.target.map((_,ci)=>{
        const val=cycle[cur[ri][ci]];
        const ok=val===r.target[ci];
        return `<td style="text-align:center"><span class="toggle ${val==='–'?'off':'on'}" onclick="authTog(${ri},${ci})" style="min-width:44px;display:inline-block">${val}</span></td>`;
      }).join("")}</tr>`).join("");
  }
  window.authTog=(ri,ci)=>{ cur[ri][ci]=(cur[ri][ci]+1)%cycle.length; draw(); check(); };
  function check(){
    let ok=true;
    rows.forEach((r,ri)=>r.target.forEach((t,ci)=>{ if(cycle[cur[ri][ci]]!==t) ok=false; }));
    const m=document.getElementById('authMsg');
    if(ok){ m.textContent='✓ Matches the Cortex-M / ThreadX authorization table — unprivileged threads touch only their code (RX) and own stack (RW).'; m.style.color='var(--green)'; }
    else { m.textContent='Keep cycling cells (click to change R/W/X). Hint: an unprivileged task gets RX on code, RW on its own stack, nothing else.'; m.style.color='var(--amber)'; }
  }
  draw(); check();

  /* ---- Challenge B: threat → mitigation matching ---- */
  const pairs=[
    {th:"Access-privilege violation", mi:"MPU reprogrammed at scheduler start + every context switch"},
    {th:"Stack overflow", mi:"MPU region sized/aligned to the stack — overflow faults"},
    {th:"Physical attack", mi:"App-writer physical protections / restricted deployment"},
    {th:"Source-code modification", mi:"Do not modify the certified RTOS kernel source"},
    {th:"Binary modification", mi:"Root of trust + secure boot + signature verification"},
  ];
  const host=document.getElementById('tmMatch');
  const shuffledMi=[...pairs.keys()].sort(()=>Math.random()-0.5);
  host.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div id="thCol"></div><div id="miCol"></div></div>`;
  const thCol=host.querySelector('#thCol'), miCol=host.querySelector('#miCol');
  pairs.forEach((p,i)=>{
    const d=document.createElement('div'); d.className='opt'; d.dataset.i=i; d.textContent=p.th;
    d.style.marginBottom='8px'; d.onclick=()=>selectTh(i,d); thCol.appendChild(d);
  });
  shuffledMi.forEach(i=>{
    const d=document.createElement('div'); d.className='opt'; d.dataset.i=i; d.textContent=pairs[i].mi;
    d.style.marginBottom='8px'; d.onclick=()=>selectMi(i,d); miCol.appendChild(d);
  });
  let pickTh=null, pickThEl=null, solved=0;
  function selectTh(i,el){
    if(el.classList.contains('correct'))return;
    thCol.querySelectorAll('.opt').forEach(o=>{ if(!o.classList.contains('correct'))o.style.borderColor='var(--line)';});
    pickTh=i; pickThEl=el; el.style.borderColor='var(--cyan)';
  }
  function selectMi(i,el){
    if(el.classList.contains('correct'))return;
    if(pickTh===null){ document.getElementById('tmMsg').textContent='Pick a threat first, then its mitigation.'; document.getElementById('tmMsg').style.color='var(--amber)'; return; }
    if(i===pickTh){
      el.classList.add('correct'); pickThEl.classList.add('correct');
      pickThEl.style.borderColor=''; solved++;
      const m=document.getElementById('tmMsg');
      if(solved===pairs.length){ m.textContent='✓ All five kernel-owned threats mapped. The remaining two (source & binary integrity) the app writer owns.'; m.style.color='var(--green)'; }
      else { m.textContent=`✓ ${solved}/${pairs.length} matched.`; m.style.color='var(--green)'; }
    } else {
      el.classList.add('wrong'); setTimeout(()=>el.classList.remove('wrong'),500);
      document.getElementById('tmMsg').textContent='Not that pair — think about which asset the mitigation protects.'; document.getElementById('tmMsg').style.color='var(--red)';
    }
    pickTh=null; pickThEl=null;
  }
}

let cnStack = ["app"];

function escHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

function cnRenderLine(line, commentChar, idx){
  let raw = line.code;
  let codePart = raw, cmt = "";
  const ci = raw.indexOf(commentChar);
  if(ci >= 0){ codePart = raw.slice(0,ci); cmt = raw.slice(ci); }
  let html = escHtml(codePart);
  if(line.links){
    line.links.forEach(([tok,to])=>{
      const re = new RegExp("\\b"+escRe(escHtml(tok))+"\\b","g");
      html = html.replace(re, `<span class="cn-lnk" onclick="cnGo('${to}')">${escHtml(tok)}</span>`);
    });
  }
  const cmtHtml = cmt ? `<span class="cn-cmt">${escHtml(cmt)}</span>` : "";
  const num = String(idx+1).padStart(2," ");
  return `<div class="cn-line ${line.focus?'cn-focus':''}"><span class="ln">${num}</span>  ${html}${cmtHtml}</div>`;
}

function cnRender(){
  const id = cnStack[cnStack.length-1];
  const u = cnUnits[id];
  const cc = u.lang==="asm" ? ";" : "//";
  // tree
  document.getElementById('cnTree').innerHTML = cnTree.map(g=>
    `<div class="fh">${g.group}</div>` + g.items.map(([iid,label])=>
      `<div class="cn-sym ${iid===id?'active':''}" onclick="cnJump('${iid}')"><span class="fx">${iid===id?'▸':'·'}</span>${label}</div>`
    ).join("")
  ).join("");
  // crumb
  document.getElementById('cnCrumb').innerHTML =
    (cnStack.length>1 ? `<span class="c" onclick="cnBack()">◀ back</span> · ` : "") +
    cnStack.map((s,i)=>`<span class="c" onclick="cnCrumbTo(${i})">${cnUnits[s].file}</span>`).join(" <span style='color:var(--muted)'>›</span> ");
  // title + code
  document.getElementById('cnTitle').textContent = u.title;
  document.getElementById('cnCode').innerHTML = u.lines.map((l,i)=>cnRenderLine(l,cc,i)).join("");
  document.getElementById('cnNote').innerHTML = u.note;
}
window.cnGo = (to)=>{ if(cnStack[cnStack.length-1]!==to) cnStack.push(to); cnRender(); };
window.cnJump = (id)=>{ cnStack=[id]; cnRender(); };
window.cnBack = ()=>{ if(cnStack.length>1) cnStack.pop(); cnRender(); };
window.cnCrumbTo = (i)=>{ cnStack = cnStack.slice(0,i+1); cnRender(); };

};

function dbgRender(){
  const s=SCEN[dbg.scn], v=dbgVariant(), fr=v.frames[dbg.idx];
  // defense label + switch
  document.getElementById('dbgDefLabel').textContent = s.defLabel;
  const sw=document.getElementById('dbgSwitch');
  sw.textContent = dbg.def ? "ON" : "OFF";
  sw.className = "dbg-switch " + (dbg.def ? "on" : "off");
  document.getElementById('dbgFile').textContent = s.file;
  // code
  document.getElementById('dbgCode').innerHTML = v.code.map((ln,i)=>{
    const cc = ln.indexOf(ln.includes(";")&&!ln.includes("//")?";":"//");
    let code=ln, cmt="";
    const idx = ln.search(/\/\/|;/);
    if(idx>=0){ code=ln.slice(0,idx); cmt=ln.slice(idx); }
    return `<div class="dbg-cl ${i===fr.line?'dbg-cur':''}">${escHtml(code)}${cmt?`<span class="cn-cmt">${escHtml(cmt)}</span>`:''}</div>`;
  }).join("");
  // registers
  const rk=[["pc","PC"],["sp","SP"],["lr","LR"],["psr","xPSR"]];
  document.getElementById('dbgRegs').innerHTML = rk.map(([k,lab])=>{
    const hot = fr.hi && fr.hi[k] ? (fr.hi[k]==="bad"?"hb":"hg") : "";
    return `<div class="rk">${lab}</div><div class="rv ${hot}">${fr.regs[k]}</div>`;
  }).join("");
  // mpu
  const mpuH=document.getElementById('dbgMpuH'), mpuBox=document.getElementById('dbgMpu');
  if(v.mpu){ mpuH.style.display="block";
    mpuBox.innerHTML = v.mpu.map((m,i)=>`<div class="dbg-mpurow ${fr.mpuHot===i?'hot':''}"><span>${m.r}</span><span>${m.a}</span></div>`).join("");
  } else { mpuH.style.display="none"; mpuBox.innerHTML=""; }
  // memory cells
  document.getElementById('dbgCells').innerHTML = fr.cells.map(c=>
    `<div class="dbg-cell ${c.s}"><span class="cl">${c.l}</span><span class="cv">${c.v}</span></div>`).join("");
  // console (accumulate 0..idx)
  document.getElementById('dbgLog').innerHTML = v.frames.slice(0,dbg.idx+1).map((f,i)=>
    `<div class="l ${f.log.k}"><span class="step">${String(i).padStart(2,'0')} ▸ </span>${escHtml(f.log.t)}</div>`).join("");
  const logBox=document.getElementById('dbgLog'); logBox.scrollTop=logBox.scrollHeight;
  // banner
  const ban=document.getElementById('dbgBanner');
  if(fr.banner){ ban.style.display="block"; ban.className="dbg-banner "+fr.banner.k; ban.textContent=fr.banner.t; }
  else { ban.style.display="none"; }
  // controls
  document.getElementById('dbgCount').textContent = `frame ${dbg.idx+1} / ${v.frames.length}`;
  document.getElementById('dbgStepBtn').disabled = (dbg.idx >= v.frames.length-1);
}

/* =========================================================
   DRAG & DROP helper
========================================================= */
function enableDrag(host){
  let dragEl=null;
  host.querySelectorAll('.step').forEach(el=>{
    el.addEventListener('dragstart',()=>{dragEl=el;el.classList.add('dragging');});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');});
  });
  host.addEventListener('dragover',e=>{
    e.preventDefault();
    const after=[...host.querySelectorAll('.step:not(.dragging)')].reduce((closest,child)=>{
      const box=child.getBoundingClientRect();
      const offset=e.clientY-box.top-box.height/2;
      if(offset<0&&offset>closest.offset) return {offset,element:child};
      return closest;
    },{offset:-Infinity}).element;
    if(!dragEl) return;
    if(after==null) host.appendChild(dragEl); else host.insertBefore(dragEl,after);
  });
}

/* =========================================================
   SAVE / LOAD SESSION TO FILE  (offline, no server)
   Lets leaderboard + progress survive a refresh or move
   between cohorts. Pure Blob download + FileReader upload.
========================================================= */
function saveSession(){
  const snap = {
    app:"RTOS_Day2_Command_Center",
    version:1,
    savedAt:new Date().toISOString(),
    station: state.station,
    nextTeam: state.nextTeam,
    daySeconds: daySeconds,
    teams: state.teams.map(t=>({id:t.id,name:t.name,score:t.score,color:t.color})),
  };
  const blob = new Blob([JSON.stringify(snap,null,2)], {type:"application/json"});
  const stamp = new Date();
  const pad=n=>String(n).padStart(2,'0');
  const fname = `rtos-day2-session-${stamp.getFullYear()}${pad(stamp.getMonth()+1)}${pad(stamp.getDate())}-${pad(stamp.getHours())}${pad(stamp.getMinutes())}.json`;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=fname; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  flashHint(`Saved → ${fname}`,'var(--green)');
}
function loadSession(){ document.getElementById('loadFile').click(); }
document.getElementById('saveSession').addEventListener('click',saveSession);
document.getElementById('loadSession').addEventListener('click',loadSession);
document.getElementById('loadFile').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const snap=JSON.parse(ev.target.result);
      if(snap.app!=="RTOS_Day2_Command_Center") throw new Error("Not a Day 2 session file");
      if(Array.isArray(snap.teams)){
        state.teams = snap.teams.map((t,i)=>({
          id: t.id||(i+1), name: String(t.name||("Team "+(i+1))).slice(0,16),
          score: Math.max(0, parseInt(t.score)||0),
          color: t.color||palette[i%palette.length],
        }));
      }
      state.nextTeam = snap.nextTeam || (state.teams.length+1);
      if(typeof snap.daySeconds==="number"){ daySeconds=snap.daySeconds; renderDayClock(); }
      if(typeof snap.station==="number" && snap.station>=0 && snap.station<stations.length){ state.station=snap.station; }
      renderRail(); renderMain(); renderTeams();
      flashHint(`Loaded session from ${snap.savedAt? new Date(snap.savedAt).toLocaleString():"file"}`,'var(--green)');
    }catch(err){
      flashHint("Could not read that file — "+err.message,'var(--red)');
    }
    e.target.value=""; // allow re-loading same file
  };
  reader.readAsText(file);
});
function flashHint(msg,color){
  let el=document.getElementById('hintToast');
  if(!el){
    el=document.createElement('div'); el.id='hintToast';
    el.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#FFFFFF;border:1px solid var(--line);border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px;z-index:200;box-shadow:0 8px 26px rgba(20,40,70,.18);';
    document.body.appendChild(el);
  }
  el.textContent=msg; el.style.color=color; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.transition='opacity .5s';el.style.opacity='0';},2600);
}
